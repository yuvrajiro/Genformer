name: Publish to PyPI

# Builds the sdist + wheel and publishes them to PyPI when you push a version
# tag (e.g. `v0.1.0`) or publish a GitHub Release.
#
# Authentication uses a PyPI API Token. One-time setup:
#   1. Generate an API token on PyPI (https://pypi.org/manage/account/token/)
#   2. Go to your GitHub repository Settings -> Secrets and variables -> Actions
#   3. Create a New repository secret named `PYPI_API_TOKEN` and paste your token.

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
