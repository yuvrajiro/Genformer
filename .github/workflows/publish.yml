name: Publish to PyPI

# Builds the sdist + wheel and publishes them to PyPI when you push a version
# tag (e.g. `v0.1.0`) or publish a GitHub Release.
#
# Authentication uses PyPI Trusted Publishing (OIDC) - no API token or secret
# is required. One-time setup on PyPI:
#   1. Create the project owner / account at https://pypi.org
#   2. Go to the project (or "Publishing" for a new project) settings and add a
#      "Trusted Publisher":
#        Owner:            yuvrajiro
#        Repository name:  EnTransformer
#        Workflow name:    publish.yml
#        Environment name: pypi
#   3. Push a tag:  git tag v0.1.0 && git push origin v0.1.0
#
# Prefer an API token instead? See the commented block at the bottom.

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/genformer/
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ---------------------------------------------------------------------------
  # Alternative: publish with an API token instead of Trusted Publishing.
  # Remove the `publish` job above, create a PyPI API token, add it as the repo
  # secret `PYPI_API_TOKEN`, and use this job instead:
  #
  #   publish:
  #     needs: build
  #     runs-on: ubuntu-latest
  #     steps:
  #       - uses: actions/download-artifact@v4
  #         with:
  #           name: python-package-distributions
  #           path: dist/
  #       - uses: pypa/gh-action-pypi-publish@release/v1
  #         with:
  #           password: ${{ secrets.PYPI_API_TOKEN }}
  # ---------------------------------------------------------------------------
