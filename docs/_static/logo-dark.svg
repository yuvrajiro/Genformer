<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Genformer">
  <!-- probabilistic uncertainty band -->
  <path d="M128 144 C168 108 198 90 228 92 L228 186 C198 184 168 168 128 144 Z"
        fill="#86bdb2" fill-opacity="0.18"/>

  <!-- sample trajectories -->
  <path d="M128 144 C165 118 198 104 228 108" stroke="#86bdb2" stroke-opacity="0.6" stroke-width="2.4" stroke-linecap="round"/>
  <path d="M128 144 C166 158 196 168 228 168" stroke="#86bdb2" stroke-opacity="0.6" stroke-width="2.4" stroke-linecap="round"/>

  <!-- median forecast (dashed) -->
  <path d="M128 144 C170 142 200 140 228 138" stroke="#86bdb2" stroke-width="2.8" stroke-linecap="round" stroke-dasharray="2 7"/>

  <!-- graph edges (spatial structure) -->
  <g stroke="#86bdb2" stroke-width="3" stroke-linecap="round">
    <line x1="46" y1="160" x2="46" y2="200"/>
    <line x1="46" y1="160" x2="84" y2="180"/>
    <line x1="46" y1="200" x2="84" y2="180"/>
  </g>

  <!-- historical trend -->
  <path d="M84 180 L108 158 L128 144" stroke="#eef1f0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- graph nodes -->
  <g fill="#86bdb2">
    <circle cx="46" cy="160" r="8"/>
    <circle cx="46" cy="200" r="8"/>
    <circle cx="84" cy="180" r="8"/>
  </g>
  <circle cx="128" cy="144" r="6.5" fill="#eef1f0"/>

  <!-- forecast horizon endpoints -->
  <g fill="#86bdb2">
    <circle cx="228" cy="108" r="4"/>
    <circle cx="228" cy="168" r="4"/>
  </g>
  <circle cx="228" cy="138" r="4.5" fill="#86bdb2"/>
</svg>
